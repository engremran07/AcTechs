# AC Techs — Release Build & Publish
#
# Triggered when a version tag of the form `v*.*.*` is pushed (e.g. v1.2.0),
# or manually via workflow_dispatch (for pre-release testing).
# Builds both debug and release APKs, then creates a GitHub Release and
# attaches both APKs as downloadable assets.
#
# Required repository secrets:
#   GOOGLE_SERVICES_JSON    — base64-encoded android/app/google-services.json
#   FIREBASE_OPTIONS_DART   — base64-encoded lib/firebase_options.dart
#   KEYSTORE_FILE           — base64-encoded release keystore (.jks / .keystore)
#   KEYSTORE_PASSWORD       — store password
#   KEY_ALIAS               — key alias
#   KEY_PASSWORD            — key password
#
# To create a release:
#   git tag v1.0.0
#   git push origin v1.0.0

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. v1.0.0-beta)'
        required: true
        default: 'v1.0.0-test'
        type: string
      create_release:
        description: 'Create a GitHub Release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  # ── Release Build ──────────────────────────────────────────────────────────
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    env:
      # Use tag name for tag-triggered runs, or the manually-provided version
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version_name || github.ref_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter (3.41.6)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      # ── Gradle cache ────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/*.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── Decode Firebase config secrets ──────────────────────────────────────
      - name: Resolve google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
            echo "Using google-services.json from secret"
          elif [ -f android/app/google-services.json ]; then
            echo "Secret not set; using repository google-services.json"
          else
            echo "Secret not set and file missing; using CI fallback google-services.json"
            echo "" | base64 --decode > android/app/google-services.json
          fi

      - name: Resolve firebase_options.dart
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          if [ -n "$FIREBASE_OPTIONS_DART" ]; then
            echo "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart
            echo "Using firebase_options.dart from FIREBASE_OPTIONS_DART secret"
          elif [ -f lib/firebase_options.dart ]; then
            echo "FIREBASE_OPTIONS_DART secret not set; using repository firebase_options.dart"
          else
            echo "FIREBASE_OPTIONS_DART secret not set and repository file missing; generating CI fallback"
            echo "" | base64 --decode > lib/firebase_options.dart
          fi

          if ! grep -q "class DefaultFirebaseOptions" lib/firebase_options.dart; then
            echo "firebase_options.dart is invalid or missing DefaultFirebaseOptions"
            exit 1
          fi

      # ── Decode release keystore (optional but recommended) ─────────────────
      - name: Decode release keystore
        continue-on-error: true
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
        run: |
          if [ -z "$KEYSTORE_FILE" ]; then
            echo "⚠️  KEYSTORE_FILE secret not set — release APK will use debug signing."
            exit 0
          fi
          echo "$KEYSTORE_FILE" | base64 --decode > android/app/release.keystore
          chmod 600 android/app/release.keystore

      - name: Write key.properties
        continue-on-error: true
        run: |
          if [ ! -f android/app/release.keystore ]; then
            echo "⚠️  Keystore not available — skipping key.properties generation."
            exit 0
          fi
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.keystore
          EOF

      # ── Dependencies & tests ───────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      # ── Build APKs ─────────────────────────────────────────────────────────
      - name: Build debug APK
        run: flutter build apk --debug

      - name: Rename debug APK
        run: |
          mv build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/ac-techs-${{ env.RELEASE_VERSION }}-debug.apk

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename release APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/ac-techs-${{ env.RELEASE_VERSION }}-release.apk

      # ── Upload APKs as artifacts (available even without a GitHub Release) ──
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ac-techs-${{ env.RELEASE_VERSION }}-apks
          path: build/app/outputs/flutter-apk/ac-techs-*.apk
          retention-days: 30

      # ── Generate changelog from commits since last tag ─────────────────────
      - name: Generate changelog
        id: changelog
        run: |
          # Find the previous tag (if any)
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo '')
          if [ -z "$PREV_TAG" ]; then
            # No prior tags: list last 20 commits
            LOG=$(git log --oneline --max-count=20 --pretty=format:"- %h: %s")
          else
            # List commits since previous tag
            LOG=$(git log "$PREV_TAG"..HEAD --oneline --pretty=format:"- %h: %s")
          fi
          # Fallback if no commits found
          if [ -z "$LOG" ]; then
            LOG="- Initial release or no commits found"
          fi
          # Write multi-line output safely to GITHUB_OUTPUT
          {
            echo "log<<CHANGELOG_EOF"
            echo "$LOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release (tag pushes OR manual with create_release=true)
      - name: Create GitHub Release
        if: github.event_name == 'push' || inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: AC Techs ${{ env.RELEASE_VERSION }}
          draft: false
          prerelease: ${{ contains(env.RELEASE_VERSION, '-') }}
          body: |
            ## AC Techs ${{ env.RELEASE_VERSION }}

            ### 📥 Downloads
            | File | Description |
            |------|-------------|
            | `ac-techs-${{ env.RELEASE_VERSION }}-release.apk` | Production build (minified + R8) |
            | `ac-techs-${{ env.RELEASE_VERSION }}-debug.apk`   | Debug build (for testing) |

            ### 📝 Changes
            ${{ steps.changelog.outputs.log }}

            ---
            Built with Flutter 3.41.6 · Firebase · Riverpod
          files: |
            build/app/outputs/flutter-apk/ac-techs-${{ env.RELEASE_VERSION }}-release.apk
            build/app/outputs/flutter-apk/ac-techs-${{ env.RELEASE_VERSION }}-debug.apk
