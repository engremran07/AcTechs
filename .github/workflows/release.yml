# AC Techs — Release Build & Publish
#
# Triggered when a version tag of the form `v*.*.*` is pushed (e.g. v1.2.0).
# Builds both debug and release APKs, then creates a GitHub Release and
# attaches both APKs as downloadable assets.
#
# Required repository secrets:
#   GOOGLE_SERVICES_JSON    — base64-encoded android/app/google-services.json
#   FIREBASE_OPTIONS_DART   — base64-encoded lib/firebase_options.dart
#   KEYSTORE_FILE           — base64-encoded release keystore (.jks / .keystore)
#   KEYSTORE_PASSWORD       — store password
#   KEY_ALIAS               — key alias
#   KEY_PASSWORD            — key password
#
# To create a release:
#   git tag v1.0.0
#   git push origin v1.0.0

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  # ── Release Build ──────────────────────────────────────────────────────────
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.x'
          channel: 'stable'
          cache: true

      # ── Decode Firebase config secrets ──────────────────────────────────────
      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode \
            > android/app/google-services.json

      - name: Decode firebase_options.dart
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          echo "$FIREBASE_OPTIONS_DART" | base64 --decode \
            > lib/firebase_options.dart

      # ── Decode release keystore (optional but recommended) ─────────────────
      - name: Decode release keystore
        if: ${{ secrets.KEYSTORE_FILE != '' }}
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
        run: |
          echo "$KEYSTORE_FILE" | base64 --decode > android/app/release.keystore

      - name: Write key.properties
        if: ${{ secrets.KEYSTORE_FILE != '' }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.keystore
          EOF

      # ── Dependencies & tests ───────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      # ── Build APKs ─────────────────────────────────────────────────────────
      - name: Build debug APK
        run: flutter build apk --debug

      - name: Rename debug APK
        run: |
          mv build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/ac-techs-${{ github.ref_name }}-debug.apk

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename release APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/ac-techs-${{ github.ref_name }}-release.apk

      # ── Generate changelog from commits since last tag ─────────────────────
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo '')
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" | head -20)
          else
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s")
          fi
          # Write multi-line output safely
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG"     >> "$GITHUB_OUTPUT"
          echo "EOF"      >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release ──────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AC Techs ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## AC Techs ${{ github.ref_name }}

            ### 📥 Downloads
            | File | Description |
            |------|-------------|
            | `ac-techs-${{ github.ref_name }}-release.apk` | Production build (minified + R8) |
            | `ac-techs-${{ github.ref_name }}-debug.apk`   | Debug build (for testing) |

            ### 📝 Changes
            ${{ steps.changelog.outputs.log }}

            ---
            Built with Flutter 3.32 · Firebase · Riverpod
          files: |
            build/app/outputs/flutter-apk/ac-techs-${{ github.ref_name }}-release.apk
            build/app/outputs/flutter-apk/ac-techs-${{ github.ref_name }}-debug.apk
