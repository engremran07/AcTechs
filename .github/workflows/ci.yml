# AC Techs — Continuous Integration
#
# Runs on every push to main and on all pull requests.
# Can also be triggered manually via workflow_dispatch.
# Steps: static analysis → unit tests → debug APK build.
#
# Required repository secrets:
#   GOOGLE_SERVICES_JSON  — base64-encoded android/app/google-services.json
#   FIREBASE_OPTIONS_DART — base64-encoded lib/firebase_options.dart

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_apk:
        description: 'Build and upload debug APK'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Analyse ─────────────────────────────────────────────────────────
  analyse:
    name: Flutter Analyse
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create firebase_options stub (for static analysis)
        run: echo "" | base64 --decode > lib/firebase_options.dart

      - name: Dart format check
        run: dart format --output=none --set-exit-if-changed lib/ test/

      - name: Flutter analyse
        run: flutter analyze --no-pub

  # ── Unit Tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: analyse
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create firebase_options stub (for tests)
        run: echo "" | base64 --decode > lib/firebase_options.dart

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 7

  # ── Debug APK Build ────────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: test
    # Skip if manually triggered with build_apk=false
    if: github.event.inputs.build_apk != 'false'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/*.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode \
            > android/app/google-services.json

      - name: Resolve firebase_options.dart
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          if [ -n "$FIREBASE_OPTIONS_DART" ]; then
            echo "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart
            echo "Using firebase_options.dart from FIREBASE_OPTIONS_DART secret"
          elif [ -f lib/firebase_options.dart ]; then
            echo "FIREBASE_OPTIONS_DART secret not set; using repository firebase_options.dart"
          else
            echo "FIREBASE_OPTIONS_DART secret not set and repository file missing; generating CI fallback"
            echo "" | base64 --decode > lib/firebase_options.dart
          fi

          if ! grep -q "class DefaultFirebaseOptions" lib/firebase_options.dart; then
            echo "firebase_options.dart is invalid or missing DefaultFirebaseOptions"
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Rename APK with build number
        run: |
          cp build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/ac-techs-debug-$(date +%Y%m%d-%H%M).apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ac-techs-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/ac-techs-debug-*.apk
          retention-days: 14
