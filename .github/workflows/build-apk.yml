# AC Techs — Manual APK Build
#
# Builds a debug or release APK on demand and uploads it as a downloadable
# artifact so you can side-load it directly onto a test device.
#
# How to use:
#   GitHub → Actions → "Build APK" → Run workflow
#   → choose build_type (debug | release)
#   → click "Run workflow"
#
# After the workflow completes (~5-8 min), download the APK from the
# "Artifacts" section of the run and install it with:
#   adb install ac-techs-<type>-<run>.apk
#
# Required repository secrets:
#   GOOGLE_SERVICES_JSON  — base64-encoded android/app/google-services.json
#   FIREBASE_OPTIONS_DART — base64-encoded lib/firebase_options.dart
#
# Optional secrets (only needed for release builds):
#   KEYSTORE_FILE         — base64-encoded release keystore
#   KEYSTORE_PASSWORD     — keystore store password
#   KEY_ALIAS             — key alias
#   KEY_PASSWORD          — key password

name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'APK build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      flutter_version:
        description: 'Flutter version (leave default unless needed)'
        required: false
        default: '3.41.6'
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ inputs.build_type }} APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Java ─────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ── Flutter ──────────────────────────────────────────────────────────
      - name: Set up Flutter ${{ inputs.flutter_version }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: 'stable'
          cache: true

      # ── Gradle cache (speeds up subsequent builds significantly) ──────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/*.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── Firebase secrets ─────────────────────────────────────────────────
      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode \
            > android/app/google-services.json

      - name: Resolve firebase_options.dart
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          if [ -n "$FIREBASE_OPTIONS_DART" ]; then
            echo "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart
            echo "Using firebase_options.dart from FIREBASE_OPTIONS_DART secret"
          elif [ -f lib/firebase_options.dart ]; then
            echo "FIREBASE_OPTIONS_DART secret not set; using repository firebase_options.dart"
          else
            echo "FIREBASE_OPTIONS_DART secret not set and repository file missing; generating CI fallback"
            cat > lib/firebase_options.dart << 'DART_EOF'
            // ignore_for_file: type=lint
            import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
            import 'package:flutter/foundation.dart'
                show defaultTargetPlatform, kIsWeb, TargetPlatform;

            class DefaultFirebaseOptions {
              static FirebaseOptions get currentPlatform {
                if (kIsWeb) {
                  return web;
                }
                switch (defaultTargetPlatform) {
                  case TargetPlatform.android:
                    return android;
                  default:
                    throw UnsupportedError('Platform not configured in CI fallback');
                }
              }

              static const FirebaseOptions android = FirebaseOptions(
                apiKey: 'CI_FALLBACK_API_KEY',
                appId: '1:000000000000:android:ci-fallback',
                messagingSenderId: '000000000000',
                projectId: 'ci-fallback',
                storageBucket: 'ci-fallback.appspot.com',
              );

              static const FirebaseOptions web = FirebaseOptions(
                apiKey: 'CI_FALLBACK_WEB_API_KEY',
                appId: '1:000000000000:web:ci-fallback',
                messagingSenderId: '000000000000',
                projectId: 'ci-fallback',
                authDomain: 'ci-fallback.firebaseapp.com',
                storageBucket: 'ci-fallback.appspot.com',
              );
            }
            DART_EOF
          fi

          if ! grep -q "class DefaultFirebaseOptions" lib/firebase_options.dart; then
            echo "firebase_options.dart is invalid or missing DefaultFirebaseOptions"
            exit 1
          fi

      # ── Release keystore (only for release builds) ────────────────────────
      - name: Decode release keystore
        if: inputs.build_type == 'release'
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
        run: |
          if [ -n "$KEYSTORE_FILE" ]; then
            echo "$KEYSTORE_FILE" | base64 --decode > android/app/release.keystore
          else
            echo "⚠️  KEYSTORE_FILE secret not set — release APK will use debug signing."
          fi

      - name: Write key.properties
        if: inputs.build_type == 'release'
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -n "$KEYSTORE_FILE" ]; then
            cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.keystore
          EOF
          fi

      # ── Flutter dependencies ──────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── Run tests before building ─────────────────────────────────────────
      - name: Run tests
        run: flutter test

      # ── Build APK ─────────────────────────────────────────────────────────
      - name: Build debug APK
        if: inputs.build_type == 'debug'
        run: flutter build apk --debug

      - name: Build release APK
        if: inputs.build_type == 'release'
        run: flutter build apk --release --no-tree-shake-icons

      # ── Stage artifact with a descriptive filename ────────────────────────
      - name: Prepare artifact
        run: |
          mkdir -p /tmp/apk-output
          if [ "${{ inputs.build_type }}" = "debug" ]; then
            cp build/app/outputs/flutter-apk/app-debug.apk \
               /tmp/apk-output/ac-techs-debug-run${{ github.run_number }}.apk
          else
            cp build/app/outputs/flutter-apk/app-release.apk \
               /tmp/apk-output/ac-techs-release-run${{ github.run_number }}.apk
          fi
          ls -lh /tmp/apk-output/

      # ── Upload APK artifact ───────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ac-techs-${{ inputs.build_type }}-run${{ github.run_number }}
          path: /tmp/apk-output/*.apk
          retention-days: 30

      # ── Print install instructions ────────────────────────────────────────
      - name: Install instructions
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║  APK BUILD COMPLETE — Install on your test device:       ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  1. Download the APK from the Artifacts section above    ║"
          echo "║  2. Enable 'Install from unknown sources' on the device  ║"
          echo "║  3. Transfer the APK to the device (USB / AirDrop / etc) ║"
          echo "║  4. Tap the APK file to install                          ║"
          echo "║                                                          ║"
          echo "║  OR via ADB (USB debugging enabled):                     ║"
          echo "║  adb install ac-techs-${{ inputs.build_type }}-run${{ github.run_number }}.apk  ║"
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""
