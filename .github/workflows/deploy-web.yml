name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FIREBASE_PROJECT_ID: actechs-d415e

jobs:
  deploy-web:
    name: Build And Deploy Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve app version from pubspec
        id: app_version
        run: |
          VERSION_LINE=$(grep -m1 '^version:' pubspec.yaml | sed 's/^version:[[:space:]]*//')
          if [ -z "$VERSION_LINE" ]; then
            echo "Unable to resolve version from pubspec.yaml"
            exit 1
          fi

          VERSION_NAME=${VERSION_LINE%%+*}
          VERSION_CODE=${VERSION_LINE##*+}

          echo "full=$VERSION_LINE" >> "$GITHUB_OUTPUT"
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Resolve firebase_options.dart
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          mkdir -p lib

          if [ -n "$FIREBASE_OPTIONS_DART" ]; then
            echo "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart
            echo "Using firebase_options.dart from FIREBASE_OPTIONS_DART secret"
          elif [ -f lib/firebase_options.dart ]; then
            echo "Using checked-in lib/firebase_options.dart"
          fi

          if [ ! -f lib/firebase_options.dart ]; then
            echo "lib/firebase_options.dart was not found after resolution"
            exit 1
          fi

          if ! grep -q "class DefaultFirebaseOptions" lib/firebase_options.dart; then
            echo "firebase_options.dart is missing DefaultFirebaseOptions"
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run web-safe test suite gate
        run: flutter test

      - name: Build web
        run: flutter build web --release --no-wasm-dry-run

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: ac-techs-web-${{ steps.app_version.outputs.full }}-run${{ github.run_number }}
          path: build/web
          retention-days: 14

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ACTECHS_D415E }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firebase Hosting
        run: firebase deploy --only hosting --project "$FIREBASE_PROJECT_ID"