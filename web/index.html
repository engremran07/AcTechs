<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- WEB-011: viewport meta tag for correct mobile browser rendering -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AC Technician Management System for Saudi Arabia operations.">

  <!-- Use CanvasKit renderer for correct complex-script (Urdu/Arabic) shaping -->
  <meta name="flutter-web-renderer" content="canvaskit">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AC Techs">
  <link rel="apple-touch-icon" href="icons/ac-techs-icon-192-v2.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon-v2.png"/>

  <title>AC Techs</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    WEB-010: Loading spinner shown while Flutter initialises.
    Automatically removed by Flutter once the engine takes over the DOM.
  -->
  <div id="flutter-loading" style="
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; height:100vh; background:#0a0e14;
    color:#00D4FF; font-family:sans-serif; gap:16px;">
    <img src="icons/ac-techs-icon-192-v2.png" alt="AC Techs"
         style="width:72px; height:72px; border-radius:16px;">
    <div style="font-size:18px; font-weight:600; letter-spacing:1px;">AC Techs</div>
    <div style="
      width:40px; height:40px; border:4px solid #00D4FF33;
      border-top-color:#00D4FF; border-radius:50%;
      animation:spin 0.9s linear infinite;">
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>
  <script>
    // Remove loading screen once Flutter signals it's ready.
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('flutter-loading');
      if (el) el.style.display = 'none';
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
