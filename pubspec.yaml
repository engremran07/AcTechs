name: ac_techs
description: "AC Techs — Multi-role AC Technician Management App"
publish_to: 'none'
version: 1.0.7+4

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_app_check: ^0.4.1+1

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.1.0

  # Code Generation (runtime)
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0

  # UI
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  gap: ^3.0.1

  # Utilities
  intl: ^0.20.2
  share_plus: ^12.0.2
  excel: ^4.0.6
  file_picker: ^10.3.2
  cross_file: ^0.3.4+2
  desktop_drop: ^0.7.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  font_awesome_flutter: ^11.0.0

  # PDF Generation (RTL support)
  pdf: ^3.11.2
  printing: ^5.13.5
  shared_preferences: ^2.5.5
  package_info_plus: ^9.0.0
  flutter_svg: ^2.2.0
  arabic_reshaper: ^0.0.1
  bidi: ^2.0.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.6
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.0
  fake_cloud_firestore: ^4.0.0
  firebase_auth_mocks: ^0.15.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/fonts/

  fonts:
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne-Variable.ttf
          weight: 400
        - asset: assets/fonts/Syne-Variable.ttf
          weight: 700
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Variable.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Variable.ttf
          weight: 700
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu.ttf
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic.ttf
